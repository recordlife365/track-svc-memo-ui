name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Upload to DO Spaces
        env:
          DO_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SECRET: ${{ secrets.DO_SPACES_SECRET }}
        run: |
          aws configure set aws_access_key_id "$DO_KEY"
          aws configure set aws_secret_access_key "$DO_SECRET"
          aws configure set default.region us-east-1
          aws s3 sync dist/ s3://lifememo/ui/ \
            --endpoint-url https://sfo3.digitaloceanspaces.com \
            --acl public-read \
            --delete
